version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: focusflow-db
    environment:
      POSTGRES_DB: focusflow
      POSTGRES_USER: focusflow
      POSTGRES_PASSWORD: focusflow123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U focusflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - focusflow-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: focusflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - focusflow-network

  # Spring Boot Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: focusflow-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/focusflow
      SPRING_DATASOURCE_USERNAME: focusflow
      SPRING_DATASOURCE_PASSWORD: focusflow123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-change-in-production}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - focusflow-network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: focusflow-frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - focusflow-network
    restart: unless-stopped

volumes:
  pgdata:

networks:
  focusflow-network:
    driver: bridge
