spring:
  application:
    name: focusflow

  datasource:
    url: jdbc:postgresql://localhost:5432/focusflow
    username: focusflow
    password: ${DB_PASSWORD:focusflow123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 60000ms

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  web:
    cors:
      allowed-origins: http://localhost:3000, http://localhost:5173
      allowed-methods: GET, POST, PUT, DELETE, OPTIONS
      allowed-headers: "*"
      allow-credentials: true

jwt:
  secret: ${JWT_SECRET:your-super-secret-key-change-in-production}
  expiration: 86400000

server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.tezprojesi: DEBUG

